name: Publish

on:
  push:
    branches:
      - main
    paths:
      - "pyproject.toml"

permissions:
  contents: write
  packages: write
  id-token: write  # required for OIDC trusted publishing to PyPI

jobs:
  publish:
    runs-on: blacksmith-2vcpu-ubuntu-2404

    steps:
      - name: Fetch secrets from Doppler
        uses: dopplerhq/secrets-fetch-action@v2.0.0
        id: doppler
        with:
          doppler-token: ${{ secrets.DOPPLER_TOKEN }}
          doppler-project: shared
          doppler-config: prod
          inject-env-vars: false

      - name: Generate token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ steps.doppler.outputs.WORKFLOW_CLIENT_ID }}
          private-key: ${{ steps.doppler.outputs.WORKFLOW_CLIENT_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Install mise
        uses: jdx/mise-action@v4

      - name: Install dependencies
        run: uv sync --frozen

      - name: Read version
        id: version
        run: |
          VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if already released
        id: check
        run: |
          if git ls-remote --tags origin "refs/tags/v${{ steps.version.outputs.value }}" | grep -q .; then
            echo "Tag v${{ steps.version.outputs.value }} already exists — skipping publish" >> "$GITHUB_STEP_SUMMARY"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build package
        if: steps.check.outputs.skip == 'false'
        run: uv build

      - name: Publish to PyPI
        if: steps.check.outputs.skip == 'false'
        run: uv publish
        env:
          UV_PUBLISH_TRUSTED_PUBLISHING: true

      - name: Tag release
        if: steps.check.outputs.skip == 'false'
        run: |
          git tag "v${{ steps.version.outputs.value }}"
          git push origin "v${{ steps.version.outputs.value }}"

      - name: Create GitHub Release
        if: steps.check.outputs.skip == 'false'
        run: |
          gh release create "v${{ steps.version.outputs.value }}" \
            --title "v${{ steps.version.outputs.value }}" \
            --generate-notes \
            dist/*
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
